test_suite: "Lark_IM_Core_Scenarios"
cases:
  - id: "IM_001"
    name: "基础文本发送与回显验证"
    steps: "在飞书搜索框查找'张三'，进入单聊，发送一条消息：'【自动化测试】这是一条测试指令'"
    assert_condition: "当前是与张三的聊天窗口，且最后一条发出的绿色消息气泡内容完全匹配'【自动化测试】这是一条测试指令'"

  - id: "IM_002"
    name: "图片发送测试"
    steps: "给张三发送一张本地图片，路径是 D:/test.jpg"
    assert_condition: "聊天界面底部出现了一张刚刚发送出去的图片缩略图，且没有发送失败的红色感叹号"